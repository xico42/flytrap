version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
  exclusions:
    paths:
      - backend/internal/app/dist
      - frontend
      - e2e

formatters:
  enable:
    - gofmt
    - goimports
